<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Chat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; font-size: 14px; }
        #chat-messages { height: 420px; overflow-y: auto; scroll-behavior: smooth; }
        .owner-tag { color: #ff4d4d; font-weight: 900; border: 1px solid #ff4d4d; padding: 0 4px; border-radius: 3px; font-size: 0.7rem; margin-right: 4px; background: rgba(255, 77, 77, 0.1); }
        #emoji-container { display: none; position: absolute; bottom: 80px; right: 10px; width: 280px; height: 320px; background: #1e293b; border: 1px solid #334155; border-radius: 12px; flex-direction: column; z-index: 100; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.4); }
        #emoji-container.active { display: flex; }
        .emoji-list { display: grid; grid-template-columns: repeat(6, 1fr); gap: 4px; padding: 10px; overflow-y: auto; }
        .emoji-item { cursor: pointer; font-size: 1.4rem; text-align: center; padding: 4px; border-radius: 6px; }
        .emoji-item:hover { background: #334155; }
        .chat-img { max-width: 220px; border-radius: 10px; margin-top: 5px; border: 1px solid #334155; cursor: pointer; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-950 text-slate-200">

<div id="app" class="max-w-5xl mx-auto p-4">
    <header class="flex justify-between items-center mb-6 border-b border-slate-800 pb-3">
        <h1 class="text-xl font-black text-indigo-500 tracking-tighter uppercase">HTML CHAT</h1>
        <div id="user-info" class="flex items-center gap-3 bg-slate-900 px-4 py-2 rounded-full border border-slate-800 text-xs font-bold"></div>
    </header>

    <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
        <div class="bg-slate-900 p-4 rounded-xl border border-slate-800 h-fit">
            <button id="btn-create-room" class="w-full bg-indigo-600 text-white py-3 rounded-lg font-black mb-4 text-xs uppercase hover:bg-indigo-500">New Room</button>
            <h3 class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-3 px-1">Rooms</h3>
            <ul id="room-list" class="space-y-2"></ul>
        </div>

        <div class="md:col-span-3 bg-slate-900 rounded-3xl border border-slate-800 flex flex-col overflow-hidden relative shadow-xl">
            <div class="p-4 bg-slate-800/40 border-b border-slate-700 flex justify-between items-center">
                <h2 id="current-room-name" class="font-black text-indigo-400 uppercase text-sm tracking-tight"># global</h2>
                <button id="btn-delete-room" class="hidden text-red-500 text-[10px] font-black border border-red-500/30 px-3 py-1.5 rounded hover:bg-red-500/10 uppercase">Delete Room</button>
            </div>
            
            <div id="chat-messages" class="flex-1 p-5 space-y-5 bg-slate-950/10"></div>
            
            <div id="typing-indicator" class="px-6 py-1 text-[10px] text-slate-500 font-bold min-h-[20px]"></div>

            <div id="emoji-container">
                <div class="emoji-list" id="emoji-grid"></div>
            </div>

            <form id="chat-form" class="p-4 flex gap-3 bg-slate-900 items-center border-t border-slate-800">
                <input type="file" id="file-input" class="hidden" accept="image/*" onchange="handleFileUpload(this)">
                <button type="button" onclick="document.getElementById('file-input').click()" class="text-slate-500 hover:text-indigo-400 p-1">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>
                </button>
                <button type="button" onclick="toggleEmojiPicker()" class="text-2xl p-1">☺</button>
                <input id="msg-input" type="text" placeholder="Type a message..." class="flex-1 bg-slate-800 border-slate-700 border p-3 rounded-xl outline-none text-white text-sm font-bold">
                <button type="submit" class="bg-indigo-600 px-6 py-3 rounded-xl font-black text-white text-xs uppercase hover:bg-indigo-500">Send</button>
            </form>
        </div>
    </div>
</div>

<div id="login-screen" class="fixed inset-0 bg-slate-950 flex items-center justify-center z-[1000]">
    <div class="bg-slate-900 p-12 rounded-[2.5rem] border border-slate-800 w-full max-w-[400px] text-center shadow-2xl">
        <h2 class="font-black text-4xl mb-10 text-indigo-500 tracking-tighter uppercase">HTML CHAT</h2>
        <input id="username-input" type="text" placeholder="Username" class="w-full bg-slate-800 p-5 rounded-2xl outline-none text-white text-center border border-slate-700 text-base mb-4 font-bold">
        <input id="password-input" type="password" placeholder="Password" class="w-full bg-slate-800 p-5 rounded-2xl outline-none text-white text-center border border-slate-700 text-base mb-8 font-bold">
        <button id="btn-login" class="w-full bg-indigo-600 py-5 rounded-2xl font-black text-base text-white uppercase tracking-widest shadow-lg shadow-indigo-500/20">Login</button>
    </div>
</div>

<script>
    const config = {
        apiKey: "AIzaSyAfuvvQFw5lpk_UxjoquPAgRPM-6aRbWlQ",
        authDomain: "htmlchat-html.firebaseapp.com",
        projectId: "htmlchat-html",
        databaseURL: "https://htmlchat-html-default-rtdb.firebaseio.com"
    };

    firebase.initializeApp(config);
    const db = firebase.database();
    const auth = firebase.auth();

    let currentUser = null, currentRoomId = 'global', typingTimeout;
    const OWNER_NAME = "LifeguardYT";
    const imgbbKey = "c09e7a9d1900d972efa208b86791302f";

    const emojiRanges = [[0x1F600, 0x1F64F], [0x1F680, 0x1F6C5], [0x1F400, 0x1F4D6], [0x1F300, 0x1F3FA], [0x2700, 0x27BF]];
    const grid = document.getElementById('emoji-grid');
    emojiRanges.forEach(range => {
        for (let i = range[0]; i <= range[1]; i++) {
            const el = document.createElement('div');
            el.className = 'emoji-item';
            el.innerHTML = String.fromCodePoint(i);
            el.onclick = () => { document.getElementById('msg-input').value += el.innerHTML; };
            grid.appendChild(el);
        }
    });
    window.toggleEmojiPicker = () => document.getElementById('emoji-container').classList.toggle('active');

    document.getElementById('btn-login').onclick = function() {
        const u = document.getElementById('username-input').value.trim();
        const p = document.getElementById('password-input').value;
        if(!u || p.length < 6) return alert("Enter Nickname & 6+ character password");
        auth.signInWithEmailAndPassword(u.toLowerCase() + "@chat.com", p).catch(() => {
            return auth.createUserWithEmailAndPassword(u.toLowerCase() + "@chat.com", p).then(c => c.user.updateProfile({ displayName: u }));
        }).then(() => window.location.reload());
    };

    auth.onAuthStateChanged(user => {
        if(user) {
            currentUser = user;
            document.getElementById('login-screen').style.display = 'none';
            renderHeader();
            loadRooms();
        }
    });

    function renderHeader() {
        const isOwner = currentUser.displayName === OWNER_NAME;
        document.getElementById('user-info').innerHTML = 
            (isOwner ? '<span class="owner-tag">OWNER</span>' : '') +
            `<span>${currentUser.displayName}</span>` +
            `<button onclick="auth.signOut().then(()=>location.reload())" class="ml-4 text-slate-500 uppercase font-black hover:text-red-400 transition">Logout</button>`;
    }

    window.handleFileUpload = function(input) {
        const file = input.files[0];
        if(!file || imgbbKey === "YOUR_API_KEY_HERE") {
            if(imgbbKey === "YOUR_API_KEY_HERE") alert("Please paste your API key in the code!");
            return;
        }
        
        const uploadBtn = document.querySelector('button[onclick*="file-input"]');
        const originalIcon = uploadBtn.innerHTML;
        uploadBtn.innerHTML = '<span class="text-[10px] animate-pulse">...</span>';

        const reader = new FileReader();
        reader.onload = async function(e) {
            const base64Data = e.target.result.split(',')[1];
            const formData = new FormData();
            formData.append('image', base64Data);

            try {
                const res = await fetch(`https://api.imgbb.com/1/upload?key=${imgbbKey}`, { 
                    method: "POST", 
                    body: formData 
                });
                const data = await res.json();
                if(data.success) {
                    sendMessage(data.data.url, true);
                } else {
                    alert("Upload Error: " + data.error.message);
                }
            } catch (err) {
                alert("Connection failed.");
            }
            uploadBtn.innerHTML = originalIcon;
        };
        reader.readAsDataURL(file);
    };

    const msgInput = document.getElementById('msg-input');
    msgInput.oninput = () => {
        db.ref(`typing/${currentRoomId}/${currentUser.uid}`).set(currentUser.displayName);
        clearTimeout(typingTimeout);
        typingTimeout = setTimeout(() => db.ref(`typing/${currentRoomId}/${currentUser.uid}`).remove(), 2000);
    };

    function listenTyping(rid) {
        db.ref(`typing/${rid}`).on('value', snap => {
            const users = snap.val() ? Object.values(snap.val()).filter(n => n !== currentUser.displayName) : [];
            document.getElementById('typing-indicator').innerText = users.length ? `${users.join(', ')} is typing...` : '';
        });
    }

    window.deleteMsg = function(rid, mid) {
        if(confirm("Delete message?")) db.ref(`messages/${rid}/${mid}`).remove();
    };

    document.getElementById('btn-delete-room').onclick = function() {
        if(confirm("Delete this room?")) {
            db.ref(`rooms/${currentRoomId}`).remove();
            db.ref(`messages/${currentRoomId}`).remove();
            joinRoom('global', 'global');
        }
    };

    function loadRooms() {
        db.ref('rooms').on('value', snap => {
            const l = document.getElementById('room-list');
            l.innerHTML = `<li onclick="joinRoom('global', 'global')" class="p-3 hover:bg-slate-800 rounded-xl cursor-pointer text-slate-400 font-black uppercase text-xs transition"># global</li>`;
            snap.forEach(c => {
                const r = c.val();
                l.innerHTML += `<li onclick="joinRoom('${c.key}', '${r.name}')" class="p-3 hover:bg-slate-800 rounded-xl cursor-pointer text-slate-200 font-black text-xs uppercase flex justify-between items-center transition">
                    <span># ${r.name}</span> 
                    ${r.password ? `<span>🔒</span>` : ''}
                </li>`;
            });
        });
        joinRoom('global', 'global');
    }

    function joinRoom(rid, rname) {
        db.ref('rooms/' + rid).once('value', snap => {
            const d = snap.val();
            const isOwner = currentUser && currentUser.displayName === OWNER_NAME;
            
            if(rid !== 'global' && d && d.password) {
                const msg = isOwner ? `Enter Password (Current: ${d.password})` : "Locked Room. Enter Password:";
                const p = prompt(msg);
                if(p !== d.password) return alert("Access Denied");
            }
            
            currentRoomId = rid;
            document.getElementById('current-room-name').innerText = "# " + rname;
            listenTyping(rid);

            const hasDeleteRights = isOwner || (d && d.owner === currentUser.uid);
            document.getElementById('btn-delete-room').classList.toggle('hidden', !hasDeleteRights);
            
            db.ref('messages/' + rid).off();
            db.ref('messages/' + rid).limitToLast(50).on('value', snap => {
                const cont = document.getElementById('chat-messages');
                cont.innerHTML = '';
                snap.forEach(c => {
                    const m = c.val(), mid = c.key;
                    const msgOwner = m.userName === OWNER_NAME;
                    const canDelete = isOwner || m.userId === currentUser.uid;

                    cont.innerHTML += `<div class="group flex flex-col">
                        <div class="flex items-center gap-2 mb-1">
                            <span class="text-[10px] font-black uppercase ${msgOwner ? 'text-red-500' : 'text-indigo-400'}">
                                ${msgOwner ? '[OWNER] ' : ''}${m.userName}
                            </span>
                            ${canDelete ? `<button onclick="deleteMsg('${rid}', '${mid}')" class="hidden group-hover:block text-[9px] text-slate-600 hover:text-red-500 font-bold uppercase">Delete</button>` : ''}
                        </div>
                        <div class="bg-slate-900 p-3 rounded-2xl rounded-tl-none border border-slate-800 text-sm text-slate-200 max-w-[85%] shadow-sm">
                            ${m.isImage ? `<img src="${m.text}" class="chat-img" onclick="window.open(this.src)">` : m.text}
                        </div>
                    </div>`;
                });
                cont.scrollTop = cont.scrollHeight;
            });
        });
    }

    function sendMessage(text, isImg = false) {
        if(!text.trim()) return;
        db.ref('messages/' + currentRoomId).push({ text, userName: currentUser.displayName, userId: currentUser.uid, isImage: isImg });
        db.ref(`typing/${currentRoomId}/${currentUser.uid}`).remove();
    }

    document.getElementById('chat-form').onsubmit = (e) => {
        e.preventDefault();
        sendMessage(msgInput.value);
        msgInput.value = '';
    };

    document.getElementById('btn-create-room').onclick = () => {
        const n = prompt("Room Name:"); if(!n) return;
        const p = prompt("Room Password (leave blank for none):");
        db.ref('rooms').push({ name: n, owner: currentUser.uid, password: p || null });
    };
</script>
</body>
</html>
